name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format (check)
        run: ruff format --check .

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production compose file
        run: |
          cp .env.production.example .env
          sed -i 's/change-me-long-random-password/ci-test-password/' .env
          sed -i 's/change-me-to-a-long-random-string-at-least-50-chars/ci-test-secret-key-for-compose-validation-only/' .env
          docker compose -f docker-compose.prod.yml config --quiet

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and lint
        run: |
          npm ci
          npm run lint

      - name: Production build (smoke)
        env:
          VITE_API_BASE_URL: http://localhost:8000/api
        run: npm run build
