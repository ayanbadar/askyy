[tool.ruff]
target-version = "py311"
line-length = 88
extend-exclude = [
    ".venv",
    "venv",
    "**/migrations",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "DJ",  # flake8-django
]
ignore = [
    "DJ001",  # nullable string field on model — common in early projects
]

[tool.ruff.lint.isort]
known-first-party = ["config", "core"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"
